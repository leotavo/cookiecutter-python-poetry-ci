name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  bake-and-test:
    name: bake & test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install cookiecutter and Poetry
        run: pipx install cookiecutter && pipx install poetry

      - name: Bake the template
        run: >
          cookiecutter . --no-input --output-dir generated
          python_version="${{ matrix.python-version }}"

      - name: Install, lint, type-check and test the generated project
        working-directory: generated/my-project
        run: |
          poetry install --no-interaction
          poetry run ruff check .
          poetry run ruff format --check .
          poetry run mypy .
          poetry run pytest -q

  template-tests:
    name: template tests (pytest-cookies)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
      - name: Run template tests
        run: pytest tests -q
