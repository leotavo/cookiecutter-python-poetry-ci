name: CI

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

concurrency:
  group: ci-{% raw %}${{ github.ref }}{% endraw %}
  cancel-in-progress: {% raw %}${{ github.ref != 'refs/heads/main' }}{% endraw %}

jobs:
  ci:
    name: ci ({{ cookiecutter.python_version }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '{{ cookiecutter.python_version }}'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.4
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Cache Poetry and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: {% raw %}poetry-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-{% endraw %}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff (lint)
        run: poetry run ruff check .

      - name: Ruff (format check)
        run: poetry run ruff format --check .

      - name: Mypy (type check)
        run: poetry run mypy .

      - name: Pytest (with coverage)
        run: poetry run pytest -q --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
